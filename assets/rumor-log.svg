<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Public rumor log board</title>
  <desc id="desc">A neon bulletin board filled with one-star complaint cards, redacted lines, and abstract security alerts.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#05060a"/><stop offset=".5" stop-color="#11151a"/><stop offset="1" stop-color="#1c0e1c"/></linearGradient>
    <linearGradient id="card" x1="0" x2="1"><stop offset="0" stop-color="#22151b"/><stop offset="1" stop-color="#0b141d"/></linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <path d="M120 120h1360v660H120z" fill="#090b10" stroke="#20c7ff" stroke-opacity=".25" stroke-width="4"/>
  <g stroke-width="3" stroke-opacity=".55">
    <path d="M260 240l330 180 350-120 310 210" stroke="#ff2f9b"/>
    <path d="M360 610l280-230 370 260 250-410" stroke="#ffc94d"/>
  </g>
  <g>
    <rect x="190" y="180" width="330" height="175" rx="14" fill="url(#card)" stroke="#ff2f9b" stroke-opacity=".55"/>
    <rect x="610" y="145" width="355" height="190" rx="14" fill="url(#card)" stroke="#20c7ff" stroke-opacity=".55"/>
    <rect x="1060" y="185" width="330" height="170" rx="14" fill="url(#card)" stroke="#ffc94d" stroke-opacity=".55"/>
    <rect x="250" y="470" width="350" height="190" rx="14" fill="url(#card)" stroke="#39e77b" stroke-opacity=".45"/>
    <rect x="710" y="455" width="335" height="185" rx="14" fill="url(#card)" stroke="#ff2f9b" stroke-opacity=".55"/>
    <rect x="1130" y="480" width="290" height="170" rx="14" fill="url(#card)" stroke="#20c7ff" stroke-opacity=".5"/>
  </g>
  <g fill="#ff2f9b">
    <text x="230" y="245" font-family="Arial, sans-serif" font-size="42">★☆☆☆☆</text>
    <text x="650" y="215" font-family="Arial, sans-serif" font-size="42">★☆☆☆☆</text>
    <text x="1100" y="250" font-family="Arial, sans-serif" font-size="42">★☆☆☆☆</text>
    <text x="290" y="535" font-family="Arial, sans-serif" font-size="42">★☆☆☆☆</text>
    <text x="750" y="520" font-family="Arial, sans-serif" font-size="42">★☆☆☆☆</text>
    <text x="1170" y="545" font-family="Arial, sans-serif" font-size="42">★☆☆☆☆</text>
  </g>
  <g stroke="#f7f3ea" stroke-opacity=".35" stroke-width="10">
    <path d="M230 285h245M230 320h190M650 255h265M650 292h225M1100 288h240M1100 324h175M290 575h250M290 612h185M750 560h240M750 598h205M1170 585h205M1170 622h155"/>
  </g>
  <path d="M1330 90l85 32v80c0 65-35 105-85 134-50-29-85-69-85-134v-80z" fill="none" stroke="#39e77b" stroke-width="7" filter="url(#glow)"/>
  <path d="M170 720h1260" stroke="#20c7ff" stroke-width="8" stroke-opacity=".6" filter="url(#glow)"/>
</svg>
