  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#05060a"/>
      <stop offset=".52" stop-color="#10131d"/>
      <stop offset="1" stop-color="#16101d"/>
